# Dev override — enables hot reload by mounting source directly
services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: deps
    command: pnpm dev
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
      - flashguides_data:/data
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  flashguides_data:
    name: flashguides_data
